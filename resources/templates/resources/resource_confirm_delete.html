<!DOCTYPE html>
<html>
<head>
    <title>Confirm Delete - {{ resource.title }}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'resources/style.css' %}">
</head>
<body>
    <div class="container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;">
        <div class="card">
            <h2>Are you sure you want to delete this resource?</h2>
            <p><strong>{{ resource.title }}</strong></p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="button contact">Yes, Delete</button>
                <a href="{% url 'resource_detail' resource.id %}" class="button">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
